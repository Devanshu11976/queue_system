# Server
server.port=8080

# Thread pool
thread.pool.size=4
thread.pool.queue.capacity=100
ui.refresh.interval.ms=1500

# Task constraints (user submits via API; these are bounds/defaults for the form)
task.priority.min=1
task.priority.max=10
task.priority.default=5
task.deadline.min.seconds=30
task.deadline.default.seconds=3600
task.max.retries=3

# Comma-separated
task.cancellable.statuses=PENDING,RUNNING

# UI status sort weight (higher = shown first)
status.sort.RUNNING=4
status.sort.PENDING=3
status.sort.COMPLETED=2
status.sort.FAILED=1
status.sort.CANCELLED=0

# AI rule-based fallback when Groq is unavailable
ai.fallback.priority.PAYMENT=9
ai.fallback.priority.REPORT=7
ai.fallback.priority.EMAIL=5
ai.fallback.priority.NOTIFICATION=3
ai.fallback.priority.DATA_SYNC=2
ai.fallback.priority.default=5

api.key.prefix=gsk_
api.groq.console.url=https://console.groq.com/keys

# Dashboard copy (served via GET /api/config/ui — not hardcoded in HTML/JS)
ui.app.title=AI Task Queue
ui.app.subtitle=Multi-threaded queue · port {port} · {poolSize} worker threads
